# =========================
# Basic Site Settings
# =========================
locale: "es-CL"
title: "Isaac Peña-Villalobos, PhD"
title_separator: "|"
name: &name "Isaac Peña-Villalobos"
description: &description "Investigador en Ecología Evolutiva, Fisiología Integrativa y Salud Ambiental."
url: "https://ipenavillalobos-ui.github.io"
baseurl: ""   # importante: vacío si usas GitHub Pages en raíz
repository: "ipenavillalobos-ui.github.io"

# =========================
# Theme (compatible con Academic Pages / Minimal Mistakes)
# =========================
minimal_mistakes_skin: "default"

# =========================
# Site Author
# =========================
author:
  avatar: "profile.png"
  name: "Isaac Peña-Villalobos"
  pronouns: "he/him"
  bio: "Doctor en Ciencias c/m en Ecología y Biología Evolutiva. Investigador Responsable FONDECYT 1251362"
  location: "Santiago, Chile"
  employer: "Universidad de Chile"
  uri: ""
  email: "isaac.pena@uchile.cl"

  # Academic profiles
  googlescholar: "https://scholar.google.com/citations?user=ERwCmF8AAAAJ&hl=en"
  orcid: "https://orcid.org/0000-0002-5599-5290"
  researchgate: "https://www.researchgate.net/profile/Isaac-Pena-Villalobos"
  pubmed: "https://pubmed.ncbi.nlm.nih.gov/?term=Pena-Villalobos+I"

  # Developer profiles
  github: "isaacpena"

# =========================
# Publication Categories
# =========================
publication_category:
  manuscripts:
    title: "Artículos en Revistas Científicas"
  conferences:
    title: "Congresos y Conferencias"

# =========================
# SEO Verification
# =========================
google_site_verification: ""
bing_site_verification: ""

# =========================
# Social Sharing (opcional)
# =========================
twitter:
  username: ""
facebook:
  username: ""

# =========================
# Analytics (Google Analytics 4)
# =========================
analytics:
  provider: false
  # Para activar:
  # provider: "google"
  # google:
  #   tracking_id: "G-XXXXXXXXXX"

# =========================
# Reading Files
# =========================
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - Gemfile
  - node_modules
  - package.json*
  - README
  - vendor

# =========================
# Collections
# =========================
collections:
  teaching:
    output: true
    permalink: /docencia/:path/
  publications:
    output: true
    permalink: /publicaciones/:path/
  portfolio:
    output: true
    permalink: /proyectos/:path/
  talks:
    output: true
    permalink: /charlas/:path/

# =========================
# Defaults
# =========================
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
